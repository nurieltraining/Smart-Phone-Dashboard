<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>סדנת הטלפון החכם</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, 'Arial Hebrew', sans-serif; }

  body {
    background: #0D1117;
    color: #F0F6FF;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 40% at 50% -10%, rgba(122,154,58,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 60% 30% at 90% 100%, rgba(85,107,47,0.1) 0%, transparent 70%);
    pointer-events: none;
  }

  .wrap { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 1.5rem 4rem; }

  /* ── LOGOS BAR ── */
  .logos-bar {
    background: transparent;
    padding: 0;
    margin: -10px -1.5rem 0 -1.5rem;
    overflow: hidden;
    width: calc(100% + 3rem);
  }
  .logos-bar img {
    width: 100%;
    height: auto;
    display: block;
    filter: brightness(2.2) contrast(1.3) saturate(1.2);
  }

  /* ── BADGE ── */
  .badge {
    display: block; text-align: center; margin-bottom: 1.8rem;
    background: rgba(122,154,58,0.15); border: 1px solid rgba(154,184,74,0.45);
    color: #9AB84A; font-size: 17px; font-weight: 700;
    padding: 8px 24px; border-radius: 50px;
    width: fit-content; margin-left: auto; margin-right: auto;
  }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 14px;
  }

  /* ── CARD ── */
  .card {
    background: linear-gradient(180deg, #A8C850 0%, #6B8C2A 50%, #3D5010 100%);
    border: 2px solid #9AB84A;
    border-radius: 16px;
    padding: 16px 12px 14px;
    text-decoration: none;
    display: flex; flex-direction: column; align-items: center; justify-content: space-between;
    gap: 8px;
    height: 200px;
    position: relative; overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
    animation: popIn 0.4s both;
    box-shadow: 0 4px 16px rgba(60,80,20,0.5);
  }

  .card:nth-child(odd)  { background: linear-gradient(180deg, #A8C850 0%, #6B8C2A 50%, #3D5010 100%); }
  .card:nth-child(even) { background: linear-gradient(180deg, #98B840 0%, #5C7C1A 50%, #2E4008 100%); }

  .card:hover {
    transform: translateY(-5px) scale(1.03);
    box-shadow: 0 14px 36px rgba(60,80,20,0.7);
    border-color: #C8E060;
  }
  .card:active { transform: scale(0.97); }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.88) translateY(10px); }
    to   { opacity: 1; transform: scale(1)    translateY(0); }
  }
  .card:nth-child(1)  { animation-delay: 0.02s }
  .card:nth-child(2)  { animation-delay: 0.04s }
  .card:nth-child(3)  { animation-delay: 0.06s }
  .card:nth-child(4)  { animation-delay: 0.08s }
  .card:nth-child(5)  { animation-delay: 0.10s }
  .card:nth-child(6)  { animation-delay: 0.12s }
  .card:nth-child(7)  { animation-delay: 0.14s }
  .card:nth-child(8)  { animation-delay: 0.16s }
  .card:nth-child(9)  { animation-delay: 0.18s }
  .card:nth-child(10) { animation-delay: 0.20s }
  .card:nth-child(11) { animation-delay: 0.22s }
  .card:nth-child(12) { animation-delay: 0.24s }
  .card:nth-child(13) { animation-delay: 0.26s }
  .card:nth-child(14) { animation-delay: 0.28s }
  .card:nth-child(15) { animation-delay: 0.30s }
  .card:nth-child(16) { animation-delay: 0.32s }
  .card:nth-child(17) { animation-delay: 0.34s }
  .card:nth-child(18) { animation-delay: 0.36s }

  /* number */
  .num {
    position: absolute; top: 8px; left: 10px;
    font-size: 12px; font-weight: 900; color: rgba(0,0,0,0.5);
    background: rgba(0,0,0,0.15);
    border-radius: 6px; padding: 2px 7px;
  }

  /* icon image 3D */
  .icon-wrap {
    width: 74px; height: 74px;
    perspective: 300px;
    display: flex; align-items: center; justify-content: center;
  }
  .icon-wrap {
    width: 72px; height: 72px;
    perspective: 300px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .icon-img {
    width: 72px; height: 72px;
    min-width: 72px; min-height: 72px;
    max-width: 72px; max-height: 72px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 18px;
    overflow: hidden;
    transition: transform 0.35s cubic-bezier(.23,1.2,.32,1), box-shadow 0.35s;
    transform: rotateX(18deg) rotateY(-18deg) rotateZ(-3deg);
    box-shadow:
      6px 10px 0px rgba(0,0,0,0.35),
      8px 14px 20px rgba(0,0,0,0.5),
      -2px -2px 8px rgba(255,255,255,0.2);
  }
  .icon-img svg { width: 72px !important; height: 72px !important; min-width:72px; max-width:72px; display: block; }
  .icon-img img { width: 72px !important; height: 72px !important; object-fit: cover; display: block; }
  .card:hover .icon-img {
    transform: rotateX(-8deg) rotateY(12deg) rotateZ(2deg) scale(1.18);
    box-shadow:
      -6px 12px 0px rgba(0,0,0,0.3),
      -8px 16px 28px rgba(0,0,0,0.5),
      3px -3px 12px rgba(255,255,255,0.25);
  }

  /* title */
  .title {
    font-size: 18px; font-weight: 900;
    color: #ffffff;
    text-align: center; line-height: 1.35;
    text-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }

  /* line */
  .line {
    width: 36px; height: 3px; border-radius: 2px;
    background: rgba(200,230,120,0.6);
    margin-top: 2px;
  }

  /* ── FOOTER NAME ── */
  .footer-name {
    text-align: center;
    margin-top: 2.5rem;
    padding: 1.5rem 0 0.5rem;
    font-size: clamp(28px, 4vw, 48px);
    font-weight: 900;
    color: #8CB040;
    letter-spacing: 1px;
    line-height: 1.3;
    text-shadow:
      -1px -1px 0 #fff,
       1px -1px 0 #fff,
      -1px  1px 0 #fff,
       1px  1px 0 #fff;
  }

  footer {
    text-align: center; margin-top: 1rem;
    font-size: 13px; color: #8B949E;
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="logos-bar" id="logosBar" style="margin-bottom:-20px;"></div>

    display:flex; align-items:center; justify-content:center;

    font-family:Arial;
    border:none;
    transition: background 0.2s;
  `;
  uploadBtn.textContent = l.num;
  uploadBtn.addEventListener('mouseenter', () => uploadBtn.style.background = 'rgba(122,154,58,0.9)');
  uploadBtn.addEventListener('mouseleave', () => uploadBtn.style.background = 'rgba(0,0,0,0.55)');

  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = 'image/*';
  inp.style.display = 'none';
  inp.addEventListener('change', (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const dataUrl = ev.target.result;
      try { localStorage.setItem('icon_' + l.num, dataUrl); } catch(err) {}
      document.getElementById('icon-' + l.num).innerHTML =
        `<img src="${dataUrl}" style="width:68px;height:68px;object-fit:contain;border-radius:14px;" />`;
    };
    reader.readAsDataURL(file);
  });
  uploadBtn.appendChild(inp);

  wrapper.appendChild(a);
  wrapper.appendChild(uploadBtn);
  grid.appendChild(wrapper);
});
